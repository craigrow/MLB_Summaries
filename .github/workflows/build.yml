name: Generate MLB Digest
on:
  schedule:
    - cron: '0 14 * * *'  # 7 AM PT (UTC-7)
    - cron: '0 8 * * *'   # 1 AM PT (UTC-7)
  workflow_dispatch: {}    # manual trigger

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: node generate.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      - run: node generate-standings.js
      - run: node generate-leaders.js
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html standings.html leaders.html
          git diff --cached --quiet || git commit -m "Update digest for $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push
